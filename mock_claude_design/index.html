  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'ui-sans-serif', 'system-ui'],
            mono: ['Geist Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            ink: {
              50: '#f7f8fa',
              100: '#eef0f4',
              200: '#dde1e9',
              300: '#c1c8d4',
              400: '#8c95a6',
              500: '#5b6473',
              600: '#3e4654',
              700: '#2a313d',
              800: '#1a1f29',
              900: '#0f131b',
            },
            brand: {
              50: '#eef4ff',
              100: '#dde8ff',
              200: '#bcd2ff',
              300: '#8eb1ff',
              400: '#5d87fb',
              500: '#3b66ee',
              600: '#2a4dd1',
              700: '#243da6',
              800: '#1f3585',
              900: '#1c2e6a',
            },
          },
          boxShadow: {
            card: '0 1px 0 0 rgba(15,19,27,0.04), 0 1px 2px 0 rgba(15,19,27,0.04)',
            pop: '0 12px 32px -8px rgba(15,19,27,0.18), 0 2px 6px -2px rgba(15,19,27,0.08)',

  <style>
    html, body { background: #f4f6fa; color: #1a1f29; }
    body { font-family: 'Geist', ui-sans-serif, system-ui; -webkit-font-smoothing: antialiased; }
    /* Subtle scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #c1c8d4; border-radius: 8px; border: 2px solid #f4f6fa; }
    ::-webkit-scrollbar-track { background: transparent; }
    /* Drawer/modal animations */
    .drawer-enter { transform: translateX(100%); }
    .drawer-enter-active { transform: translateX(0); transition: transform .28s cubic-bezier(.2,.8,.2,1); }
    .fade-in { animation: fadeIn .18s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .slide-in { animation: slideIn .28s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes slideIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    /* Calendar event */
    .ev { font-size: 11px; line-height: 1.15; }
    .ev-tight { letter-spacing: -0.005em; }
    /* Focus ring */
    .ring-brand:focus { outline: none; box-shadow: 0 0 0 3px rgba(59,102,238,0.18); border-color: #3b66ee; }
    /* Hide spinner inputs */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
